apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-secret-refresh-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-refresh-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-secret-refresh-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: ecr-secret-refresh-sa
    namespace: default
roleRef:
  kind: Role
  name: ecr-secret-refresh-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-refresh
  namespace: default
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-secret-refresh-sa
          containers:
            - name: ecr-secret-refresh
              image: alpine/k8s:1.28.3
              command:
                - /bin/sh
                - -c
                - |
                  ECR_PASSWORD=$(aws ecr get-login-password --region ca-central-1)
                  kubectl delete secret ecr-secret --ignore-not-found
                  kubectl create secret docker-registry ecr-secret \
                    --docker-server=758955050042.dkr.ecr.ca-central-1.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password=$ECR_PASSWORD
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: secret-access-key
          restartPolicy: OnFailure
