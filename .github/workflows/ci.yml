name: CI/CD Pipeline
on:
  push:
    branches: [docker-foundation, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Verify app starts
        run: node -e "require('./src/server')" &

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker build -t $ECR_REGISTRY/uptime-guardian:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/uptime-guardian:$IMAGE_TAG $ECR_REGISTRY/uptime-guardian:latest
          docker push $ECR_REGISTRY/uptime-guardian:$IMAGE_TAG
          docker push $ECR_REGISTRY/uptime-guardian:latest
          echo "Image pushed: $ECR_REGISTRY/uptime-guardian:$IMAGE_TAG"