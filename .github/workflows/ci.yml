name: CI/CD Pipeline
on: 
  push:
    branches: [ docker-foundation, main ]

jobs:
  test :
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4

      - uses : actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run : npm ci
      - run : node -e "require('./src/server')" &
        name : verify app starts

  build-and-push : 
    runs-on: ubuntu-latest
    needs: test
    steps :
      - uses : actions/checkout@v4

      - name : Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name : Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name : Build and push Docker image
        run : |
          IMAGE_TAG= ${{ github.sha }}
          ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}
          docker build -t $ECR_REPOSITORY/uptime-guardian :$IMAGE_TAG .
          docker push $ECR_REPOSITORY/uptime-guardian :$IMAGE_TAG
          echo "Image pushed : $ECR_REPOSITORY/uptime-guardian :$IMAGE_TAG"