apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-secret-refresh-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-refresh-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-secret-refresh-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: ecr-secret-refresh-sa
    namespace: default
roleRef:
  kind: Role
  name: ecr-secret-refresh-role
  apiGroup: rbac.authorization.k8s.io