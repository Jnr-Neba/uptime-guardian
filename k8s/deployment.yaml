apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-guardian
  labels:
    app: uptime-guardian
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uptime-guardian
  template:
    metadata:
      labels:
        app: uptime-guardian
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: uptime-guardian
          image: 758955050042.dkr.ecr.ca-central-1.amazonaws.com/uptime-guardian:latest
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
